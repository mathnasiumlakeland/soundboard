<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Soundboard</title>
		<meta
			name="description"
			content="A tiny soundboard with browser-side audio caching."
		/>
		<link rel="stylesheet" href="./assets/styles.css" />
	</head>
	<body>
		<main id="content">
			<div id="instants_container">
				<section class="instants result-page" aria-label="Sound buttons">
					<article class="instant">
						<div class="circle small-button-background" style="background-color: #ff0000"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="you-stupid"
							data-label="You Stupid"
							data-url="https://www.myinstants.com/media/sounds/ustoopid.mp3"
							aria-label="Play You Stupid"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<button type="button" class="instant-link" data-sound-label="you-stupid">
							You Stupid
						</button>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #ff0000"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="vine-boom"
							data-label="Vine Boom"
							data-url="https://www.myinstants.com/media/sounds/vine-boom.mp3"
							aria-label="Play Vine Boom"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<button type="button" class="instant-link" data-sound-label="vine-boom">
							Vine Boom
						</button>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #00ff12"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="correct"
							data-label="Correct"
							data-url="https://www.myinstants.com/media/sounds/correct.mp3"
							aria-label="Play Correct"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<button type="button" class="instant-link" data-sound-label="correct">
							Correct
						</button>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #5c5c5c"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="incorrect"
							data-label="Incorrect"
							data-url="https://www.myinstants.com/media/sounds/wrong-answer-sound-effect.mp3"
							aria-label="Play Incorrect"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<button type="button" class="instant-link" data-sound-label="incorrect">
							Incorrect
						</button>
					</article>
				</section>
			</div>
		</main>

		<p id="announcement" class="sr-only" aria-live="polite">
			Tap a button to play a sound. First use warms a local browser cache when allowed.
		</p>
		<audio id="soundboard-audio" preload="none"></audio>

		<script src="./assets/app.js" defer></script>
	</body>
</html>
