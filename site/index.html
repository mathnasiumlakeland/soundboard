<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Soundboard</title>
		<meta
			name="description"
			content="A tiny soundboard with browser-side audio caching."
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="./assets/styles.css" />
	</head>
	<body>
		<main id="content">
			<div id="instants_container">
				<section class="instants result-page" aria-label="Sound buttons">
					<article class="instant">
						<div class="circle small-button-background" style="background-color: #ff0000"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="vine-boom"
							data-label="Vine Boom"
							data-url="https://www.myinstants.com/media/sounds/vine-boom.mp3"
							aria-label="Play Vine Boom"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<span class="instant-link">Vine Boom</span>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #00ff12"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="correct"
							data-label="Correct"
							data-url="https://www.myinstants.com/media/sounds/correct.mp3"
							aria-label="Play Correct"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<span class="instant-link">Correct</span>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #f56eff"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="are-you-sure-about-that"
							data-label="Are You Sure About That"
							data-url="https://www.myinstants.com/media/sounds/are-you-sure-about-that.mp3"
							aria-label="Play Are You Sure About That"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<span class="instant-link">Are You Sure About That</span>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #ffff00"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="bruh"
							data-label="Bruh"
							data-url="https://www.myinstants.com/media/sounds/movie_1.mp3"
							aria-label="Play Bruh"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<span class="instant-link">Bruh</span>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #e1a3ff"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="67"
							data-label="67"
							data-url="https://www.myinstants.com/media/sounds/67_SQlv2Xv.mp3"
							data-password="67"
							aria-label="Play 67"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<span class="instant-link">67</span>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #ff9900"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="grunt-birthday-party"
							data-label="Grunt Birthday"
							data-url="https://www.myinstants.com/media/sounds/grunt-birthday-party.mp3"
							aria-label="Play Grunt Birthday"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<span class="instant-link">Grunt Birthday</span>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #5c5c5c"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="incorrect"
							data-label="Incorrect"
							data-url="https://www.myinstants.com/media/sounds/wrong-answer-sound-effect.mp3"
							aria-label="Play Incorrect"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<span class="instant-link">Incorrect</span>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #663300"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="womp-womp-womp"
							data-label="Womp Womp Womp"
							data-url="https://www.myinstants.com/media/sounds/downer_noise.mp3"
							aria-label="Play Womp Womp Womp"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<span class="instant-link">Womp Womp Womp</span>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #6f97f8"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="another-one"
							data-label="Another One"
							data-url="https://www.myinstants.com/media/sounds/another-one_dPvHt2Z.mp3"
							aria-label="Play Another One"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<span class="instant-link">Another One</span>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #e1e48f"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="laugh-track"
							data-label="Laugh Track"
							data-url="https://www.myinstants.com/media/sounds/sitcom-laughing-1.mp3"
							aria-label="Play Laugh Track"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<span class="instant-link">Laugh Track</span>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #6f97f8"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="applause"
							data-label="Applause"
							data-url="https://www.myinstants.com/media/sounds/aplausos_2.mp3"
							aria-label="Play Applause"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<span class="instant-link">Applause</span>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #ff4f8b"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="yay"
							data-label="Yay"
							data-url="https://www.myinstants.com/media/sounds/kids-saying-yay-sound-effect_3.mp3"
							aria-label="Play Yay"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<span class="instant-link">Yay</span>
					</article>

					<article class="instant">
						<div class="circle small-button-background" style="background-color: #5fd7ff"></div>
						<button
							type="button"
							class="small-button"
							data-sound
							data-id="huh"
							data-label="Huh"
							data-url="https://www.myinstants.com/media/sounds/ceeday-huh-sound-effect.mp3"
							aria-label="Play Huh"
						></button>
						<div class="small-button-shadow" aria-hidden="true"></div>
						<span class="instant-link">Huh</span>
					</article>
				</section>
			</div>
		</main>

		<div id="password-modal" class="password-modal" hidden>
			<div class="password-modal-backdrop" data-password-cancel></div>
			<div
				class="password-modal-panel"
				role="dialog"
				aria-modal="true"
				aria-labelledby="password-modal-title"
			>
				<form id="password-form" class="password-form">
					<h2 id="password-modal-title" class="password-modal-title">Enter password</h2>
					<input
						id="password-input"
						class="password-input"
						type="password"
						autocomplete="off"
						autocapitalize="off"
						autocorrect="off"
						spellcheck="false"
						inputmode="text"
						aria-label="Password"
					/>
					<div class="password-actions">
						<button type="button" class="password-button password-button-secondary" data-password-cancel>
							Cancel
						</button>
						<button type="submit" class="password-button">Play
						</button>
					</div>
				</form>
			</div>
		</div>

		<p id="announcement" class="sr-only" aria-live="polite">
			Tap a button to play a sound. First use warms a local browser cache when allowed.
		</p>
		<audio id="soundboard-audio" preload="none"></audio>

		<script src="./assets/app.js" defer></script>
	</body>
</html>
